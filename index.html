<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muchachos</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      scroll-behavior: smooth;
    }

    /* HEADER */
    header {
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .header-img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: -1;
    }

    header h1 {
      font-size: 3.5rem;
      margin: 0;
      font-weight: 900;
      text-shadow: 3px 3px 15px rgba(0,0,0,0.9);
    }

    header p {
      margin-top: 12px;
      font-size: 1.3rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
    }

    /* BOTONES */
    .menu-botones {
      margin-top: 50px;
      display: flex;
      gap: 50px;
      justify-content: center;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .boton-container {
      text-align: center;
      cursor: pointer;
    }

    .boton-container span {
      display: block;
      margin-bottom: 10px;
      font-weight: bold;
      color: black;
      background: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.95rem;
    }

    .boton-container img {
      width: 140px;
      transition: transform 0.3s;
    }

    .boton-container:hover img {
      transform: scale(1.1);
    }

    /* SECCIONES */
    section {
      padding: 80px 20px;
      text-align: center;
      min-height: 100vh;
    }

    h2 {
      font-size: 2rem;
      font-weight: 900;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
    }

    p {
      font-size: 1.1rem;
      font-weight: 500;
      text-shadow: 1px 1px 8px rgba(0,0,0,0.8);
    }

    /* MENÚ */
    #menu {
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('muchachosplato.jpg') center/cover no-repeat;
    }

    .menu-categorias {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .categoria {
      background: rgba(34,34,34,0.85);
      padding: 20px;
      border-radius: 10px;
      width: 250px;
      font-weight: bold;
    }

    /* SOBRE NOSOTROS */
    #sobre-nosotros {
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('bandera.jpg') center/cover no-repeat;
    }

    .mapa-container {
      margin-top: 30px;
      display: flex;
      justify-content: center;
    }

    .mapa-container iframe {
      width: 90%;
      height: 400px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.2);
    }

    /* CONTACTO */
    #contacto {
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('fondo.jpg') center/cover no-repeat;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 1.1rem;
    }

    footer {
      padding: 20px;
      background: #000;
    }

    @media(max-width: 600px){
      .menu-botones {
        flex-direction: column;
        gap: 40px;
      }
    }
  </style>
</head>

<body>

<header>
  <img src="muchachos-fondo.jpg" class="header-img">
  <div class="overlay"></div>

  <h1>MUCHACHOS</h1>
  <p>EL BODEGÓN DE LOS CAMPEONES DEL MUNDO</p>

  <div class="menu-botones">

    <div class="boton-container" onclick="scrollToSection('menu')">
      <span>MENÚ</span>
      <img src="kempeslevantando.jpg">
    </div>

    <div class="boton-container" onclick="scrollToSection('sobre-nosotros')">
      <span>SOBRE NOSOTROS</span>
      <img src="messilevantando.jpg">
    </div>

    <div class="boton-container" onclick="scrollToSection('contacto')">
      <span>CONTACTO</span>
      <img src="maradonalevantando.jpg">
    </div>

  </div>
</header>

<section id="menu">
  <h2>Menú</h2>
  <div class="menu-categorias">
    <div class="categoria">Desayuno</div>
    <div class="categoria">Cafés</div>
    <div class="categoria">Bebidas</div>
    <div class="categoria">Comidas</div>
    <div class="categoria">Postres</div>
  </div>
</section>

<section id="sobre-nosotros">
  <h2>Sobre Nosotros</h2>
  <p>Av. de los Lagos 7010, Tigre</p>

  <div class="mapa-container">
    <iframe 
      src="https://www.google.com/maps?q=Av.+de+los+Lagos+7010,+Tigre&output=embed"
      loading="lazy">
    </iframe>
  </div>
</section>

<section id="contacto">
  <h2>Contacto</h2>
  <p>Reservas por WhatsApp</p>

  <a class="btn" href="https://wa.me/5491172438839?text=Hola%20quiero%20reservar%20una%20mesa%20en%20Muchachos" target="_blank">
    Reservar ahora
  </a>
</section>

<footer>
  <p>© 2026 Muchachos</p>
</footer>

<script>
  function scrollToSection(id) {
    document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
  }
</script>

</body>
</html>
