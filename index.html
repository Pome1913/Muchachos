<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muchachos</title>

  <!-- FUENTE ELEGANTE -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      scroll-behavior: smooth;
    }

    /* HEADER */
    header {
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .header-img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: -1;
    }

    header h1 {
      font-size: 3.5rem;
      margin: 0;
      font-weight: 900;
      text-shadow: 3px 3px 15px rgba(0,0,0,0.9);
    }

    header p {
      margin-top: 12px;
      font-size: 1.3rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
    }

    /* BOTONES ELEGANTES */
    .menu-botones {
      margin-top: 50px;
      display: flex;
      gap: 25px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .boton-container {
      cursor: pointer;
    }

    .boton {
      padding: 14px 30px;
      background: rgba(255,255,255,0.9);
      color: #111;
      border-radius: 30px;

      font-family: 'Playfair Display', serif;
      font-weight: 800;
      letter-spacing: 1px;

      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      transition: all 0.3s ease;
    }

    .boton:hover {
      background: #FFD700;
      transform: translateY(-3px);
    }

    /* SECCIONES */
    section {
      padding: 80px 20px;
      text-align: center;
      min-height: 100vh;
    }

    h2 {
      font-size: 2rem;
      font-weight: 900;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
    }

    p {
      font-size: 1.1rem;
      text-shadow: 1px 1px 8px rgba(0,0,0,0.8);
    }

    /* MENÚ */
    #menu {
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('muchachosplato.jpg') center/cover no-repeat;
    }

    .menu-categorias {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .categoria {
      background: rgba(34,34,34,0.85);
      padding: 20px;
      border-radius: 10px;
      width: 250px;
      font-weight: bold;
    }

    /* SOBRE NOSOTROS */
    #sobre-nosotros {
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('bandera.jpg') center/cover no-repeat;
    }

    .mapa-container {
      margin-top: 30px;
      display: flex;
      justify-content: center;
    }

    .mapa-container iframe {
      width: 90%;
      height: 400px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.2);
    }

    .horarios {
      margin-top: 20px;
      font-weight: bold;
      font-size: 1.2rem;
    }

    /* CONTACTO */
    #contacto {
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('fondo.jpg') center/cover no-repeat;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 1.1rem;
    }

    .instagram {
      background: linear-gradient(45deg, #feda75, #d62976, #962fbf, #4f5bd5);
    }

    footer {
      padding: 20px;
      background: #000;
    }

    @media(max-width: 600px){
      .menu-botones {
        flex-direction: column;
        gap: 20px;
      }
    }
  </style>
</head>

<body>

<header>
  <img src="muchachos-fondo.jpg" class="header-img">
  <div class="overlay"></div>

  <h1>MUCHACHOS</h1>
  <p>EL BODEGÓN DE LOS CAMPEONES DEL MUNDO</p>

  <div class="menu-botones">

    <div class="boton-container" onclick="scrollToSection('menu')">
      <div class="boton">MENÚ</div>
    </div>

    <div class="boton-container" onclick="scrollToSection('sobre-nosotros')">
      <div class="boton">SOBRE NOSOTROS</div>
    </div>

    <div class="boton-container" onclick="scrollToSection('contacto')">
      <div class="boton">CONTACTO</div>
    </div>

  </div>
</header>

<section id="menu">
  <h2>Menú</h2>
  <div class="menu-categorias">
    <div class="categoria">Desayuno</div>
    <div class="categoria">Cafés</div>
    <div class="categoria">Bebidas</div>
    <div class="categoria">Comidas</div>
    <div class="categoria">Postres</div>
  </div>
</section>

<section id="sobre-nosotros">
  <h2>Sobre Nosotros</h2>
  <p>Av. de los Lagos 7010, Tigre</p>

  <div class="mapa-container">
    <iframe 
      src="https://www.google.com/maps?q=Av.+de+los+Lagos+7010,+Tigre&output=embed"
      loading="lazy">
    </iframe>
  </div>

  <div class="horarios">
    Abierto todos los días de 10:00 a 23:00
  </div>
</section>

<section id="contacto">
  <h2>Contacto</h2>
  <p>Reservas por WhatsApp</p>

  <a class="btn" href="https://wa.me/5491172438839?text=Hola%20quiero%20reservar%20una%20mesa%20en%20Muchachos" target="_blank">
    Reservar ahora
  </a>

  <br><br>

  <a class="btn instagram" href="https://www.instagram.com/muchachos.bodegon/" target="_blank">
    Ver Instagram
  </a>
</section>

<footer>
  <p>© 2026 Muchachos</p>
</footer>

<script>
  function scrollToSection(id) {
    document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
  }
</script>

</body>
</html>
